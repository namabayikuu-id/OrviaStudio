<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #C8963E; --gold-lt: #E8C07A; --surface: #F3F2EC; --border: rgba(26,26,24,0.08); }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #2C1654 0%, #7B5CFF 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }
  .mockup { background: #fff; border-radius: 8px; width: 78%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; }
  .bar { background: #f0f0f0; height: 24px; display: flex; align-items: center; padding: 0 10px; gap: 5px; border-bottom: 1px solid #e0e0e0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-r { background: rgba(255,95,87,.7); } .dot-y { background: rgba(254,188,46,.7); } .dot-g { background: rgba(40,200,64,.7); }
  .url-bar { flex: 1; height: 13px; background: #fff; border-radius: 4px; margin: 0 8px; border: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 6px; font-size: 7px; color: #aaa; }
  .body { padding: 14px; }
  .hero-block {
    background: linear-gradient(135deg, #2C1654, #7B5CFF);
    border-radius: 5px; padding: 16px 14px; margin-bottom: 10px; text-align: center;
  }
  .tag-sm { font-size: 6px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.6); margin-bottom: 8px; }
  .h-sm { font-family: 'Fraunces', serif; font-size: 11px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 8px; }
  .sub-sm { font-size: 6px; color: rgba(255,255,255,.55); margin-bottom: 12px; line-height: 1.5; }
  .btn-sm { display: inline-block; background: var(--gold); font-size: 6.5px; font-weight: 700; padding: 5px 12px; border-radius: 3px; color: #fff; margin-bottom: 6px; }
  .note-sm { font-size: 5.5px; color: rgba(255,255,255,.45); }
  .trust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .trust-item { background: var(--surface); border-radius: 5px; padding: 8px 10px; display: flex; align-items: center; gap: 6px; }
  .check { font-size: 8px; color: var(--gold); }
  .line { height: 5px; border-radius: 3px; background: var(--border); margin-bottom: 3px; }
  .w80 { width: 80%; } .w60 { width: 60%; }
</style>
</head>
<body>
  <div class="mockup">
    <div class="bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <div class="url-bar">kelas-parenting.id</div>
    </div>
    <div class="body">
      <div class="hero-block">
        <div class="tag-sm">Kelas Online Parenting</div>
        <div class="h-sm">Jadikan Anak Anda Lebih<br>Percaya Diri & Bahagia</div>
        <div class="sub-sm">Metode berbasis riset, dipandu psikolog anak berpengalaman.<br>7 hari transformasi nyata.</div>
        <div class="btn-sm">Daftar Sekarang — Gratis 1 Sesi</div>
        <div class="note-sm">⭐ 4.9/5 dari 1.200+ orang tua</div>
      </div>
      <div class="trust-grid">
        <div class="trust-item"><span class="check">✓</span><div><div class="line w80"></div><div class="line w60"></div></div></div>
        <div class="trust-item"><span class="check">✓</span><div><div class="line w80"></div><div class="line w60"></div></div></div>
      </div>
    </div>
  </div>
</body>
</html>
