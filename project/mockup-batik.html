<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C8963E; --gold-lt: #E8C07A;
    --bg: #FAFAF7; --surface: #F3F2EC;
    --ink: #1A1A18; --olive: #4A5240; --accent: #2B5F3E;
    --border: rgba(26,26,24,0.08);
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #1A1A18 0%, #2B5F3E 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }
  .mockup {
    background: #fff; border-radius: 8px; width: 78%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden;
  }
  .bar {
    background: #f0f0f0; height: 24px;
    display: flex; align-items: center; padding: 0 10px; gap: 5px;
    border-bottom: 1px solid #e0e0e0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-r { background: rgba(255,95,87,.7); }
  .dot-y { background: rgba(254,188,46,.7); }
  .dot-g { background: rgba(40,200,64,.7); }
  .url-bar {
    flex: 1; height: 13px; background: #fff; border-radius: 4px;
    margin: 0 8px; border: 1px solid #e0e0e0;
    display: flex; align-items: center; padding: 0 6px;
    font-size: 7px; color: #aaa;
  }
  .body { padding: 14px; }
  .hero-block {
    background: linear-gradient(135deg, #1A1A18, #2B5F3E);
    border-radius: 5px; padding: 14px 12px; margin-bottom: 10px;
  }
  .tag-sm { font-size: 6px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 8px; }
  .h-sm { font-family: 'Fraunces', serif; font-size: 11px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 8px; }
  .sub-sm { font-size: 6px; color: rgba(255,255,255,.55); margin-bottom: 12px; line-height: 1.5; }
  .btn-sm { display: inline-block; background: var(--gold); font-size: 6px; font-weight: 700; padding: 4px 10px; border-radius: 3px; color: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mini-card { background: var(--surface); border-radius: 5px; padding: 10px; border: 1px solid var(--border); }
  .line { height: 5px; border-radius: 3px; background: var(--border); margin-bottom: 4px; }
  .w80 { width: 80%; } .w60 { width: 60%; } .w70 { width: 70%; }
</style>
</head>
<body>
  <div class="mockup">
    <div class="bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <div class="url-bar">batik-nusantara.id</div>
    </div>
    <div class="body">
      <div class="hero-block">
        <div class="tag-sm">Batik Nusantara — Semarang</div>
        <div class="h-sm">Keindahan Batik Autentik<br>Langsung dari Pengrajin</div>
        <div class="sub-sm">Koleksi batik tulis & cap berkualitas tinggi,<br>dibuat oleh pengrajin berpengalaman.</div>
        <span class="btn-sm">Lihat Koleksi →</span>
      </div>
      <div class="grid">
        <div class="mini-card"><div class="line w80"></div><div class="line w60"></div></div>
        <div class="mini-card"><div class="line w70"></div><div class="line w60"></div></div>
        <div class="mini-card"><div class="line w80"></div><div class="line w60"></div></div>
        <div class="mini-card"><div class="line w70"></div><div class="line w60"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
