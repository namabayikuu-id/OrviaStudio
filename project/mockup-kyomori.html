<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #f5f0e8; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
  <!-- Full browser window mockup — exact copy from index.html Card 3 -->
  <div style="position:absolute;inset:8px;background:#fff;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.22);overflow:hidden;display:flex;flex-direction:column;font-family:'DM Sans',sans-serif;">

    <!-- Browser chrome bar -->
    <div style="height:16px;background:#e8e8e8;display:flex;align-items:center;padding:0 7px;gap:3px;flex-shrink:0;border-bottom:1px solid #d0d0d0;">
      <div style="width:5px;height:5px;border-radius:50%;background:#ff5f57;"></div>
      <div style="width:5px;height:5px;border-radius:50%;background:#febc2e;"></div>
      <div style="width:5px;height:5px;border-radius:50%;background:#28c840;"></div>
      <div style="flex:1;height:9px;border-radius:10px;background:#fff;border:1px solid #ccc;margin:0 6px;display:flex;align-items:center;padding:0 5px;">
        <span style="font-size:0.25rem;color:#888;white-space:nowrap;overflow:hidden;">kyomori.my</span>
      </div>
    </div>

    <!-- Site navbar -->
    <div style="height:22px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;border-bottom:1px solid #eee;">
      <div style="display:flex;align-items:center;gap:3px;">
        <img src="https://raw.githubusercontent.com/Tamara1430/Kyomori.my/main/Lgfix.jpg"
             alt="KYOMORI"
             style="height:13px;width:13px;object-fit:contain;border-radius:1px;"
             onerror="this.style.display='none'">
        <div style="line-height:1;">
          <div style="font-size:0.3rem;font-weight:800;color:#1a1a1a;letter-spacing:.06em;">KYOMORI</div>
          <div style="font-size:0.2rem;color:#888;letter-spacing:.06em;">· JAPAN IMPORT</div>
        </div>
      </div>
      <div style="font-size:0.24rem;color:#aaa;letter-spacing:.1em;text-transform:uppercase;">Importer</div>
    </div>

    <!-- HERO -->
    <div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;
      background:
        linear-gradient(rgba(27,48,34,.75),rgba(27,48,34,.75)),
        url('https://media.istockphoto.com/id/694992188/photo/matcha-green-tea.jpg?s=612x612&w=0&k=20&c=WhkrAq1QibIezJlfsNO2vRsr94GNvSOc6qMAKFw2hIc=');
      background-size:cover;background-position:center;
      padding:0 8px;">
      <div>
        <div style="font-size:0.22rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:3px;">KYOMORI PRESENTS</div>
        <div style="font-family:'Fraunces',serif;font-size:0.6rem;font-weight:700;color:#fff;line-height:1.15;margin-bottom:3px;letter-spacing:-.01em;">The Finest Japanese Matcha</div>
        <div style="font-size:0.22rem;color:rgba(255,255,255,.75);line-height:1.5;">Bringing the purity of Japanese Matcha<br>directly from Uji, Shizuoka, Mie and Kagoshima</div>
      </div>
    </div>

    <!-- Bottom nav -->
    <div style="height:16px;background:#f5f1e8;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;border-top:1px solid #e8e0cc;">
      <div style="font-size:0.22rem;color:#555;border:1px solid #bbb;border-radius:20px;padding:1px 5px;letter-spacing:.06em;text-transform:uppercase;">Our Collection</div>
      <div style="font-size:0.22rem;color:#fff;background:#2d4a2e;border-radius:20px;padding:1px 5px;letter-spacing:.06em;text-transform:uppercase;">Influencer Reviews</div>
    </div>

  </div>
</body>
</html>
